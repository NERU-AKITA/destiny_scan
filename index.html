<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor del Scan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Visor de Proyectos</h1>
        <div class="selector-container">
            <label for="chapter-select">Selecciona un capítulo:</label>
            <select id="chapter-select">
                <option value="">Cargando proyectos...</option>
            </select>
        </div>
    </header>

    <main id="viewer-container">
        <div class="controls">
            <button id="prev-btn" disabled>Anterior</button>
            <span id="page-info">Selecciona un capítulo para empezar</span>
            <button id="next-btn" disabled>Siguiente</button>
        </div>
        
        <div class="image-wrapper">
            <img id="manga-image" src="" alt="Página del manga" style="display:none;">
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
